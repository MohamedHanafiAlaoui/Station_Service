spring.application.name=station-service

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:Station}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:password123}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect



logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.com.example.station_service=DEBUG
